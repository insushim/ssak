name: Build APK & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Download gradle wrapper if not present
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          ./gradlew assembleRelease

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "싹 ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 싹(SSAK) ${{ steps.version.outputs.VERSION }}

            ### 설치 방법
            1. 아래 APK 파일을 다운로드
            2. Android 기기에서 설치 (알 수 없는 소스 허용 필요)

            ### 웹 버전
            https://ssak-writing.pages.dev
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
